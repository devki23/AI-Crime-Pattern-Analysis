<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Registration - CrimeAI India</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            overflow-y: auto !important;
            font-family: 'Inter', sans-serif;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            padding: 2rem;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 1.5rem;
            border: 1px solid #334155;
            width: 100%;
            max-width: 620px;
            margin: 2rem 0;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: white;
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .form-input:focus {
            border-color: #3b82f6;
        }

        .aadhar-field {
            border-color: #3b82f6 !important;
        }

        .aadhar-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 0.5rem;
            padding: 0.7rem 1rem;
            margin-bottom: 1.2rem;
            font-size: 0.82rem;
            color: #93c5fd;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .msg-box {
            display: none;
            padding: 0.8rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .msg-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .msg-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .btn-register {
            width: 100%;
            margin-top: 1.2rem;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.4);
        }

        .btn-register:disabled {
            opacity: 0.7;
            transform: none;
            cursor: not-allowed;
        }

        .pw-wrap {
            position: relative;
        }

        .pw-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            cursor: pointer;
        }

        .pw-toggle:hover {
            color: #f8fafc;
        }
    </style>
</head>

<body class="dark-mode">
    <div class="login-container">
        <div class="login-card">
            <a href="/"
                style="text-decoration: none; color: #94a3b8; font-size: 0.9rem; margin-bottom: 1rem; display: inline-block;">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
            <div style="text-align: center; margin-bottom: 1.2rem;">
                <span style="font-size: 3rem;">🛡️</span>
                <h1 style="font-size: 1.6rem; margin-top: 0.4rem; color: #f8fafc;">CrimeAI India</h1>
            </div>
            <h2 style="font-family: 'Outfit'; margin-bottom: 0.4rem; text-align: center; color: #fff;">Police Officer
                Registration</h2>
            <p style="text-align: center; color: #94a3b8; margin-bottom: 1.2rem; font-size: 0.9rem;">
                Create your secure officer account to access the system
            </p>

            <div class="aadhar-info">
                <i class="fas fa-id-card" style="font-size: 1.1rem;"></i>
                <span>Aadhar Card number is required for identity verification. Only authorized police personnel can
                    register.</span>
            </div>

            <!-- Inline message box (error / success) -->
            <div id="msg-box" class="msg-box">
                <i class="fas fa-exclamation-circle" id="msg-icon" style="margin-right: 6px;"></i>
                <span id="msg-text"></span>
            </div>

            <form id="register-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullname" class="form-input" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label>Officer ID</label>
                        <input type="text" id="officer-id" class="form-input" placeholder="Badge / ID Number" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="phone" class="form-input" placeholder="Phone number">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Police Station</label>
                        <input type="text" id="station" class="form-input" placeholder="Enter station name" required>
                    </div>
                    <div class="form-group">
                        <label style="color: #60a5fa;">
                            <i class="fas fa-id-card" style="margin-right: 4px;"></i> Aadhar Card Number
                        </label>
                        <input type="text" id="aadhar" class="form-input aadhar-field"
                            placeholder="12-digit Aadhar number" maxlength="12" inputmode="numeric" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Password</label>
                        <div class="pw-wrap">
                            <input type="password" id="password" class="form-input" placeholder="••••••••"
                                style="padding-right: 2.5rem;" required>
                            <i class="fas fa-eye pw-toggle" onclick="togglePw('password', this)"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <div class="pw-wrap">
                            <input type="password" id="confirm" class="form-input" placeholder="••••••••"
                                style="padding-right: 2.5rem;" required>
                            <i class="fas fa-eye pw-toggle" onclick="togglePw('confirm', this)"></i>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-register" id="submit-btn">
                    <i class="fas fa-user-shield" style="margin-right: 8px;"></i> Register Officer Account
                </button>
            </form>

            <p style="text-align: center; margin-top: 1.2rem; font-size: 0.875rem; color: #94a3b8;">
                Already have an account? <a href="/login"
                    style="color: #3b82f6; text-decoration: none; font-weight: 600;">Login Here</a>
            </p>
        </div>
    </div>

    <script>
        function togglePw(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function showMsg(text, type) {
            const box = document.getElementById('msg-box');
            const icon = document.getElementById('msg-icon');
            const span = document.getElementById('msg-text');
            box.className = 'msg-box ' + (type === 'error' ? 'msg-error' : 'msg-success');
            icon.className = 'fas ' + (type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle');
            span.textContent = text;
            box.style.display = 'block';
            box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function hideMsg() {
            document.getElementById('msg-box').style.display = 'none';
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMsg();

            const fullname = document.getElementById('fullname').value.trim();
            const officerId = document.getElementById('officer-id').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const station = document.getElementById('station').value.trim();
            const aadhar = document.getElementById('aadhar').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;

            // Client-side validations
            if (password !== confirm) { showMsg('Passwords do not match!', 'error'); return; }
            if (password.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return; }
            if (!/^[A-Z]/.test(password)) { showMsg('Password must start with a capital letter.', 'error'); return; }
            if (!/^\d{12}$/.test(aadhar)) { showMsg('Aadhar Card Number must be exactly 12 digits.', 'error'); return; }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i> Registering...';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: officerId,
                        email, password, role: 'officer',
                        full_name: fullname, phone, station,
                        badge: officerId, aadhar_number: aadhar
                    })
                });

                const result = await res.json();

                if (res.ok) {
                    showMsg('Registration successful! Redirecting to login...', 'success');
                    setTimeout(() => window.location.href = '/login', 1800);
                } else {
                    showMsg(result.message || result.error || 'Registration failed. Please try again.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-shield" style="margin-right:8px;"></i> Register Officer Account';
                }
            } catch (err) {
                showMsg('Network error. Please check server connection.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-shield" style="margin-right:8px;"></i> Register Officer Account';
                console.error(err);
            }
        });
    </script>
</body>

</html>
